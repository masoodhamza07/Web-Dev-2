<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data value types in jS</title>
</head>
<body>
    <script>
        //Js data value types
        //primitive -- immutable single value data type in js
        //strig , number,boolean,undefined,null,BigInt and symbol

        //string
        var myName="Vikas singh";
        console.log(myName)

        //number
        var myMob=123456789;
        console.log(myMob);

        //boolean
        var isMarried=false;
        console.log(myName + "is married" + isMarried);

        //undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));

        //null
        var myAddress=null;
        console.log(myAddress);
        console.log(typeof(myAddress));


        //BigInt
        var myNum=BigInt(123325656547567658678769678768);
        console.log(myNum);
        console.log(typeof(myNum));

        //symbol
        var var1=Symbol("vikas")
        var var2=Symbol("Vikas");
        console.log(var1==var2);


        // Reference type(object) -- mutable in memory and keep the data in key value pair

        // object {}, function {}, array[]
        let myInfo ={
                name:"hamza",
                age:19,
                isMarried:false,
                address:"Delhi-21",
                branch:"CSE",
                section:23
        };
        console.log(myInfo);
        console.log(myInfo.name);

        //object lenght
        var keys=Object.keys(myInfo);
        console.log(keys.length);


        //function -- block of code to perform specific task
        function cal(){
            var num1=45;
            var num1=45;
            var add=num1+num2;
            console.log("Addition of Two numbers is " + add);

        }
        cal();


        //Array -- collection of any data type

        let studentList=["harsh","atul","yash"];
        console.log(studentList[0]);

        //different Data types
        let stu1=["Vikas","23","GHZ","CSE",null,10];
        console.log(stu1);
        console.log(stu1,length);


        //to iterate aaray member
        for(let i=0;i<stu1.length;i++){
            console.log(stu1[i]);
        }

        for(let x in stu1){
            console.log("updated way" + stu1[x]);
        }

    </script>
</body>
</html>
